<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OAuth Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0; background: #1e1e1e; color: #ccc;
    }
    .status { text-align: center; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #333;
      border-top-color: #1976d2; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f44336; }
    .success { color: #4caf50; }
  </style>
</head>
<body>
  <div class="status" id="status">
    <div class="spinner"></div>
    <p>Completing authentication…</p>
  </div>

  <script>
    /**
     * Static OAuth callback page.
     *
     * 1. Receives auth code from IdP redirect (URL query params)
     * 2. Exchanges auth code for tokens via IdP token endpoint
     * 3. POSTs tokens to the server-side relay endpoint
     * 4. Closes itself
     *
     * This is a static HTML file — no backend needed to host it.
     * The relay endpoint lives on the customer's existing backend.
     */
    (async function () {
      const statusEl = document.getElementById("status");

      try {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");
        const error = params.get("error");
        const codeVerifier = params.get("code_verifier");

        if (error) throw new Error("IdP returned error: " + error);
        if (!code || !state) throw new Error("Missing code or state in callback URL");
        if (!codeVerifier) throw new Error("Missing code_verifier — cannot exchange auth code");

        // Exchange auth code for tokens
        const tokenUrl = params.get("token_url") || "http://localhost:4000/token";
        const clientId = params.get("client_id") || "foxglove-extension-demo";
        const redirectUri = window.location.origin + window.location.pathname;

        const body = new URLSearchParams({
          grant_type: "authorization_code",
          code: code,
          redirect_uri: redirectUri,
          client_id: clientId,
          code_verifier: codeVerifier,
        });

        const resp = await fetch(tokenUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: body.toString(),
        });

        if (!resp.ok) {
          const text = await resp.text();
          throw new Error("Token exchange failed (" + resp.status + "): " + text);
        }

        const tokens = await resp.json();

        // POST tokens to the server-side relay endpoint.
        // The extension polls GET /auth-result?state=S to pick them up.
        const authResultUrl = tokenUrl.replace("/token", "/auth-result");
        const relayResp = await fetch(authResultUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            state: state,
            access_token: tokens.access_token,
            refresh_token: tokens.refresh_token || null,
            expires_in: tokens.expires_in || 3600,
          }),
        });

        if (!relayResp.ok) {
          throw new Error("Failed to deliver tokens to relay: " + relayResp.status);
        }

        console.log("[callback] Tokens delivered via relay");
        statusEl.innerHTML = '<p class="success">Authentication successful! This window will close.</p>';
        setTimeout(() => window.close(), 1500);

      } catch (err) {
        console.error("[callback] Error:", err);
        statusEl.innerHTML =
          '<p class="error">Authentication failed: ' + err.message + "</p>" +
          "<p>You can close this window and try again.</p>";
      }
    })();
  </script>
</body>
</html>
